name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --locked
      - run: uv run ruff check rlab tests
      - run: uv run ruff format --check rlab tests
      - run: uv run mypy rlab tests
      - run: uv run pytest
